<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    
</head>
<body>
    <h1>Exemplo de Tabelas</h1>

    <h2> Primeiro Exemplo</h2>

    <table border="1px">
        <tr>
            <th>T1</th>
            <th>T2</th>
            <th>T3</th>
        </tr>
        <tr>
            <td>A</td>
            <td>B</td>
            <td>C</td>
        </tr>
        <tr>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
    </table>

    <h2> Segundo Exemplo</h2>

    <table border="1px">
        <tr>
            <th>T1</th>
            <th>T2</th>
            <th>T3</th>
        </tr>
        <tr>
            <td rowspan="2">A</td>
            <td>B</td>
            <td>C</td>
        </tr>
        <tr>
            <td colspan="2">E</td>
            
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
    </table>


</body>

</html>
