<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores RGB</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Gerador de Cores RGB</h1>
    <div class="controle">
        <label>R: <span id="valorR">0</span></label>
        <input type="range" id="r" min="0" max="255" value="0">
    </div>
    <div class="controle">
        <label>G: <span id="valorG">0</span></label>
        <input type="range" id="g" min="0" max="255" value="0">
    </div>
    <div class="controle">
        <label>B: <span id="valorB">0</span></label>
        <input type="range" id="b" min="0" max="255" value="0">
    </div>
    <div id="cor"></div>
    <p id="codigo">rgb(0,0,0)</p>

   <script src="js/script.js"></script> 
</body>
</html>
